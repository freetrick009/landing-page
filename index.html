<!DOCTYPE html>
<html lang="en">
<head>

<style>

}

body{

}

.container{
max-width:420px;
margin:20px auto;
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

.banner{
width:100%;
height:240px;
background:linear-gradient(135deg,#FFD54F,#FF9800);
display:flex;
align-items:center;

font-size:28px;

.content{

h2{

.salary{

font-size:24px;
font-weight:bold;
margin-bottom:15px;

.list{

font-size:18px;
margin-bottom:20px;
}

.question{
font-size:18px;
font-weight:bold;
margin-top:20px;
margin-bottom:10px;

label{
display:block;
padding:8px 0;
font-size:17px;

.button{

background:#25D366;

text-decoration:none;
text-align:center;
padding:18px;
font-size:20px;

.footer{

padding:20px;
color:#666;
